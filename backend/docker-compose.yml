services:
  postgres:
    image: postgres:17-alpine
    container_name: readinpace-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: readinpace
      POSTGRES_PASSWORD: readinpace
      POSTGRES_DB: readinpace
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
